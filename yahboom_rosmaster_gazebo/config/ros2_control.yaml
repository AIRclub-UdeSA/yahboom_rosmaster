controller_manager:
  ros__parameters:
    # 30 Hz balances control responsiveness with TF message volume.
    # At 50 Hz, Fast DDS can deliver consecutive /joint_states messages slightly
    # out of order under CPU load, causing robot_state_publisher to emit TF with
    # a decreasing timestamp → continuous TF_OLD_DATA spam in any TF listener.
    update_rate: 30  # Hz
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

joint_state_broadcaster:
  ros__parameters:
    # Explicit rate cap — prevents publishing faster than the controller loop.
    # Some gz_ros2_control versions call update() at the physics rate (1 kHz)
    # regardless of update_rate above; this cap stops the broadcaster from
    # flooding /joint_states at that rate.
    publish_rate: 30.0
